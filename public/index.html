<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TDEA 管理中心</title>
  <link rel="stylesheet" href="styles.css?v=layout6">
  <link rel="stylesheet" href="sidebar.css?v=admin-avatar1">
</head>
<body>
  <div id="app"></div>
  <script>
    (() => {
      const publicKeys = ["register", "query", "memberQr", "calendar", "checkin", "redeem", "redeemSession", "monthlyDetail", "personalMessages", "close", "marquee"];
      const params = new URLSearchParams(location.search);
      const state = params.get("liff.state");
      if (state) {
        try {
          new URLSearchParams(decodeURIComponent(state).replace(/^\?/, "")).forEach((value, key) => {
            if (!params.has(key)) params.set(key, value);
          });
        } catch (_) {}
      }
      const isPublicMode = publicKeys.some((key) => params.has(key));
      if (!isPublicMode) return;
      const app = document.getElementById("app");
      if (!app) return;
      app.innerHTML = '<main data-public-fallback style="max-width:840px;margin:0 auto;padding:24px 16px;font-family:system-ui,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"><section style="background:#fff;border:1px solid #e4e7ec;border-radius:10px;padding:18px;color:#067647;font-weight:800">載入中...</section></main>';
      setTimeout(() => {
        if (!app.querySelector("[data-public-fallback]")) return;
        if (document.querySelector('script[src*="native-form.js"]')) return;
        const script = document.createElement("script");
        script.src = "/native-form.js?v=marquee-checkin1";
        script.onerror = () => {
          app.innerHTML = '<main style="max-width:840px;margin:0 auto;padding:24px 16px;font-family:system-ui,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"><section style="background:#fff3f0;border:1px solid #fecdca;border-radius:10px;padding:18px;color:#b42318;font-weight:800">核銷頁載入失敗，請重新掃描 QR。</section></main>';
        };
        document.body.appendChild(script);
      }, 1600);
    })();
  </script>
  <script src="/admin-login.js?v=admin-entry22"></script>
</body>
</html>
