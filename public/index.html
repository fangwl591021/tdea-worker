<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TDEA 管理中心</title>
  <style>
    :root {
      --green: #06c755;
      --ink: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --bg: #f4f6f8;
      --panel: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    .shell {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
    }

    aside {
      background: #2f3542;
      color: #fff;
      padding: 24px 0;
    }

    .brand {
      color: var(--green);
      font-weight: 800;
      text-align: center;
      padding-bottom: 24px;
      border-bottom: 1px solid rgba(255,255,255,.12);
    }

    nav button {
      width: 100%;
      border: 0;
      color: #d1d5db;
      background: transparent;
      padding: 14px 24px;
      text-align: left;
      font: inherit;
      cursor: pointer;
    }

    nav button.active {
      color: var(--green);
      background: rgba(6,199,85,.14);
      border-left: 4px solid var(--green);
    }

    main {
      padding: 32px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    .panel {
      background: var(--panel);
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 12px 32px rgba(15,23,42,.08);
    }

    button.primary {
      border: 0;
      border-radius: 8px;
      background: var(--green);
      color: #fff;
      padding: 10px 18px;
      font-weight: 700;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 12px;
      text-align: left;
      white-space: nowrap;
    }

    th {
      background: #f9fafb;
      color: #111827;
    }

    .muted {
      color: var(--muted);
    }

    @media (max-width: 780px) {
      .shell {
        grid-template-columns: 1fr;
      }

      aside {
        padding: 16px 0;
      }

      main {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside>
      <div class="brand">TDEA 管理中心</div>
      <nav>
        <button class="active" data-view="activities">活動總覽</button>
        <button data-view="association">協會名冊</button>
        <button data-view="vendor">廠商名冊</button>
      </nav>
    </aside>

    <main>
      <div class="toolbar">
        <h1 id="title">活動總覽</h1>
        <button class="primary" id="refresh">刷新資料</button>
      </div>
      <section class="panel">
        <div id="content" class="muted">載入中...</div>
      </section>
    </main>
  </div>

  <script>
    const state = { view: "activities" };
    const API_BASE = "https://tdeawork.fangwl591021.workers.dev";
    const title = document.querySelector("#title");
    const content = document.querySelector("#content");

    const escapeHtml = (value) => String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");

    async function fetchJson(path) {
      const res = await fetch(`${API_BASE}${path}`, { headers: { accept: "application/json" } });
      if (!res.ok) throw new Error("request failed");
      return res.json();
    }

    function renderTable(columns, rows) {
      if (!rows.length) {
        content.innerHTML = "<div class=\"muted\">目前沒有資料</div>";
        return;
      }

      const head = columns.map((column) => `<th>${escapeHtml(column.label)}</th>`).join("");
      const body = rows.map((row) => {
        const cells = columns.map((column) => `<td>${escapeHtml(row[column.key])}</td>`).join("");
        return `<tr>${cells}</tr>`;
      }).join("");

      content.innerHTML = `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
    }

    async function load() {
      content.textContent = "載入中...";

      if (state.view === "activities") {
        title.textContent = "活動總覽";
        const res = await fetchJson("/api/activities");
        renderTable([
          { key: "name", label: "活動名稱" },
          { key: "type", label: "類型" },
          { key: "course_time", label: "課程時間" },
          { key: "status", label: "狀態" }
        ], res.data || []);
      }

      if (state.view === "association") {
        title.textContent = "協會名冊";
        const res = await fetchJson("/api/members/association");
        renderTable([
          { key: "member_no", label: "會員編號" },
          { key: "name", label: "姓名" },
          { key: "identity", label: "身分" },
          { key: "qualification", label: "資格" }
        ], res.data || []);
      }

      if (state.view === "vendor") {
        title.textContent = "廠商名冊";
        const res = await fetchJson("/api/members/vendor");
        renderTable([
          { key: "member_no", label: "會員編號" },
          { key: "company_name", label: "公司名稱" },
          { key: "tax_id", label: "統編" },
          { key: "qualification", label: "資格" }
        ], res.data || []);
      }
    }

    document.querySelectorAll("nav button").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll("nav button").forEach((item) => item.classList.remove("active"));
        button.classList.add("active");
        state.view = button.dataset.view;
        load().catch(() => {
          content.textContent = "資料載入失敗";
        });
      });
    });

    document.querySelector("#refresh").addEventListener("click", () => {
      load().catch(() => {
        content.textContent = "資料載入失敗";
      });
    });

    load().catch(() => {
      content.textContent = "資料載入失敗";
    });
  </script>
</body>
</html>
