<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TDEA 圖文選單</title>
  <link rel="stylesheet" href="styles.css?v=layout5">
  <style>
    body{margin:0;background:#f1f5f9}
    .shell{display:block;min-height:100vh}
    .main{padding:28px;max-width:1480px;margin:0 auto}
  </style>
</head>
<body>
  <div class="shell">
    <main class="main">
      <div class="panel" style="padding:24px">圖文選單載入中...</div>
    </main>
  </div>
  <script src="rich-menu-manager.js?v=rich-menu7"></script>
  <script>
    window.addEventListener("load", () => {
      if (window.TDEARichMenuManager?.show) window.TDEARichMenuManager.show();
      else document.querySelector(".main").innerHTML = '<div class="panel" style="padding:24px">圖文選單模組載入失敗，請重新整理此頁。</div>';
    });
  </script>
</body>
</html>
